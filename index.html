<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeChat UI Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background-color: #d8d8d8;
        background-image:
          linear-gradient(45deg, #ececec 25%, transparent 25%),
          linear-gradient(-45deg, #ececec 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #ececec 75%),
          linear-gradient(-45deg, transparent 75%, #ececec 75%);
        background-size: 20px 20px;
        background-position: 0 0, 0 10px, 10px -10px, -10px 0;
      }

      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body class="m-0">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      // Optional runtime overrides. Define these before loading app modules.
      // window.CHAT_UI_CONFIG = {
      //   participants: { self: {...}, chatPartner: {...} },
      //   chatPartnerName: '...',
      //   items: [{ type: 'timestamp', label: '14:30' }, ...]
      // };
    </script>

    <script type="text/babel" data-presets="react" src="./src/core/constants.js"></script>
    <script type="text/babel" data-presets="react" src="./src/core/math.js"></script>
    <script type="text/babel" data-presets="react" src="./src/domain/message-motion.js"></script>
    <script type="text/babel" data-presets="react" src="./src/domain/timeline.js"></script>
    <script type="text/babel" data-presets="react" src="./src/domain/media.js"></script>
    <script type="text/babel" data-presets="react" src="./src/data/chat-config.js"></script>

    <script type="text/babel" data-presets="react" src="./src/components/layout/chat-header.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/layout/chat-composer.jsx"></script>

    <script type="text/babel" data-presets="react" src="./src/components/messages/base/avatar.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/messages/base/text-bubble.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/messages/base/message-row.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/messages/base/base-message.jsx"></script>

    <script type="text/babel" data-presets="react" src="./src/components/messages/types/timestamp-message.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/messages/types/text-message.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/messages/types/video-message.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/messages/registry.jsx"></script>

    <script type="text/babel" data-presets="react" src="./src/app.jsx"></script>
    <script type="text/babel" data-presets="react" src="./chat.jsx"></script>

    <script type="text/babel" data-presets="react">
      const rootElement = document.getElementById('root');
      if (!rootElement) {
        throw new Error('Missing #root element for preview rendering.');
      }

      if (typeof ChatApp !== 'function') {
        throw new Error('Missing ChatApp export on window.');
      }

      const root = ReactDOM.createRoot(rootElement);
      root.render(<ChatApp />);
    </script>
  </body>
</html>
